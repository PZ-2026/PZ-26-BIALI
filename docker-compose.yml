version: '3.8'

services:
  db:
    image: postgres:15
    container_name: fitmanager-postgres
    environment:
      POSTGRES_DB: fitmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - fitmanager_db_data:/var/lib/postgresql/data
      - ./baza+data.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
    container_name: fitmanager-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/fitmanager
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      - db
    restart: unless-stopped

volumes:
  fitmanager_db_data: