# ─────────────────────────────────────────────────────────
# H2 in-memory profile — local development without PostgreSQL
# ─────────────────────────────────────────────────────────
# Activate with: --spring.profiles.active=h2
# or set env:    SPRING_PROFILES_ACTIVE=h2
# ─────────────────────────────────────────────────────────

spring.datasource.url=jdbc:h2:mem:fitmanager;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Używamy H2-kompatybilnego schematu i danych (bez partial unique indexes i INTERVAL)
spring.sql.init.schema-locations=classpath:schema-h2.sql
spring.sql.init.data-locations=classpath:data-h2.sql

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=none

spring.jpa.defer-datasource-initialization=true

# H2 Console (opcjonalnie — podgląd bazy w przeglądarce)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
