services:
  postgres:
    image: postgres:16
    container_name: fitmanager-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fitmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../baza+data.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

volumes:
  postgres_data:
